name: Black

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Black
        run: python -m pip install --disable-pip-version-check black==26.5.1

      - name: Check formatting
        run: black --check .
